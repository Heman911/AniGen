<!DOCTYPE html>
<html lang="en">
<head>
    <title>Genre Classifier</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* LIVE BACKGROUND */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* OVERLAY */
        .overlay {
            background: linear-gradient(
                rgba(0, 0, 0, 0.6),
                rgba(0, 0, 0, 0.9)
            );
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            opacity: 0.9;
        }

        textarea {
            width: 400px;
            height: 120px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;

            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(10px);
        }

        textarea::placeholder {
            color: #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;

            box-shadow: 0 0 10px #ff4757;
            transition: 0.3s;
        }

        button:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        /* RESULTS */
        .results {
            margin-top: 25px;
        }

        .results div {
            background: rgba(0,0,0,0.7);
            margin: 5px;
            padding: 8px 15px;
            border-radius: 6px;
        }

        a {
            margin-top: 30px;
            color: #ff4757;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='forBG.mp4') }}" type="video/mp4">
</video>

<div class="overlay">

    <h1> Genre Classification</h1>
    <p>Paste an anime description and predict genres</p>

    <!-- CONNECTED FORM -->
    <form action="/classify" method="POST">
        <textarea name="description" placeholder="Enter anime description..." required></textarea><br>
        <button type="submit">Predict</button>
    </form>

    <!-- RESULTS DISPLAY -->
    {% if results %}
        <div class="results">
            <h2>Predicted Genres:</h2>
            {% for genre, score in results %}
                <div>{{ genre }} — {{ score }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
