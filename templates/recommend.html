<!DOCTYPE html>
<html lang="en">
<head>
    <title>Recommendations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
        }

        /* BACKGROUND */
        #bg-video {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .overlay {
            background: rgba(0,0,0,0.85);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* GRADIENT OVERLAY */
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* INFO OVER IMAGE */
        .info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px;
            z-index: 2;
            font-size: 13px;
        }

        .info h3 {
            margin: 5px 0;
            font-size: 15px;
        }

        .info p {
            margin: 2px 0;
            opacity: 0.9;
        }

        /* COLORS */
        .score { color: gold; }
        .rank { color: #ff6b81; }
        .members { color: lightblue; }

        /* BACK */
        a {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #ff4757;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='New.mp4') }}">
</video>

<div class="overlay">

<h1>Recommendations</h1>

<div class="grid">
    {% for anime in results %}
        <div class="card">

            <!-- POSTER -->
            <img src="{{ anime.image }}" onerror="this.src='/static/default.png'">

            <!-- INFO -->
            <div class="info">
                <h3>{{ anime.title }}</h3>

                <p class="score"> {{ anime.score }}</p>
                <p class="rank"> Rank: {{ anime.rank }}</p>
                <p class="members"> {{ anime.members }}</p>

                <p><b>Genres:</b> {{ anime.genres }}</p>
                <p>{{ anime.type }} • {{ anime.episodes }} eps</p>
            </div>

        </div>
    {% endfor %}
</div>

<a href="/">⬅ Back</a>

</div>

</body>
</html>
